{{ define "main" }}
  <section class="bg-navy text-white">
    <div class="container-premium py-16">
      <p class="eyebrow">Leadership</p>
      <h1 class="mt-4 text-4xl font-extrabold tracking-tight sm:text-5xl">{{ .Title }}</h1>
      <p class="mt-5 max-w-2xl text-base leading-7 text-white/75 sm:text-lg">{{ .Params.description }}</p>
    </div>
  </section>
  <section class="section">
    <div class="container-premium">
      <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        {{ range hugo.Data.board }}
          {{ partial "board-card.html" . }}
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
